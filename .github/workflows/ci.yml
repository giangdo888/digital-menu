name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore DigitalMenu.sln

    - name: Build Code
      run: dotnet build DigitalMenu.sln --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test DigitalMenu.sln --no-build --configuration Release --verbosity normal

  # This job simulates building the Docker image for deployment.
  # We will expand this in the AWS Phase to push to a container registry.
  docker_build:
    needs: build_and_test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t digitalmenuapi:latest .
